# ==========================
# Sleep / Power Management
# ==========================
CONFIG_ZMK_SLEEP=y
# dim/sleep display after 10 min idle (in milliseconds)
CONFIG_ZMK_IDLE_TIMEOUT=600000

# ==========================
# Keyscan Filtering
# ==========================
# Note: debounce (ms) → higher = fewer false presses, slower response
CONFIG_ZMK_KSCAN_DEBOUNCE_PRESS_MS=8
CONFIG_ZMK_KSCAN_DEBOUNCE_RELEASE_MS=8